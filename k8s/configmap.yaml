apiVersion: v1
kind: ConfigMap
metadata:
  name: generator-config
  labels:
    app: event-generator
data:
  # Non-sensitive DB connection parameters.
  # Passwords must be stored in a Secret, not here.
  POSTGRES_HOST: "postgres-service"
  POSTGRES_DB: "eventdb"
  POSTGRES_USER: "eventuser"
  EVENT_COUNT: "1000"
